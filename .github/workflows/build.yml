name: Build MetaLens

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download ExifTool
      run: |
        echo Downloading ExifTool...
        curl.exe -L -o exiftool.zip "https://sourceforge.net/projects/exiftool/files/exiftool-13.51_64.zip/download" || curl.exe -L -o exiftool.zip "https://sourceforge.net/projects/exiftool/files/exiftool-13.50_64.zip/download"
      shell: cmd

    - name: Create Payload Zip
      run: |
        Expand-Archive -Path "exiftool.zip" -DestinationPath "exiftool_tmp" -Force
        # Find the inner directory e.g., exiftool-13.51_64
        $innerDir = Get-ChildItem -Path "exiftool_tmp" -Directory | Select-Object -First 1
        if ($innerDir) {
           # Rename exiftool(-k).exe to exiftool.exe
           $exe = Get-ChildItem -Path $innerDir.FullName -Filter "*.exe" | Select-Object -First 1
           if ($exe -and $exe.Name -ne "exiftool.exe") {
             Rename-Item -Path $exe.FullName -NewName "exiftool.exe"
           }
           # Create assets dir if it doesn't exist
           if (!(Test-Path -Path "assets")) {
               New-Item -ItemType Directory -Path "assets"
           }
           # Compress the contents into payload.zip
           Compress-Archive -Path "$($innerDir.FullName)\*" -DestinationPath "assets\payload.zip" -Force
           $sizeMB = [math]::Round((Get-Item "assets\payload.zip").Length / 1MB, 2)
           Write-Host "Created assets\payload.zip ($sizeMB MB)"
        } else {
           Write-Error "Could not find extracted directory"
           exit 1
        }
      shell: pwsh

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: x86_64-pc-windows-msvc

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build MetaLens
      run: cargo build --release

    - name: Verify build
      run: |
        if (Test-Path "target\release\MetaLens.exe") {
          $size = (Get-Item "target\release\MetaLens.exe").Length / 1MB
          Write-Host "BUILD OK - MetaLens.exe ($([math]::Round($size, 2)) MB) - ExifTool embedded!"
        } else {
          Write-Error "BUILD FAILED"
          exit 1
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MetaLens-Windows-x64
        path: target/release/MetaLens.exe
        retention-days: 90

    # --- Release steps ---
    - name: Set Release Tag
      id: vars
      shell: bash
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "is_release=true" >> $GITHUB_OUTPUT
        else
          echo "tag=latest" >> $GITHUB_OUTPUT
          echo "is_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Create release zip
      run: Compress-Archive -Path "target\release\MetaLens.exe" -DestinationPath "MetaLens-${{ steps.vars.outputs.tag }}-windows-x64.zip"

    - name: Update Latest Tag
      if: steps.vars.outputs.is_release == 'false'
      uses: richardsimko/update-tag@v1
      with:
        tag_name: latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.vars.outputs.tag }}
        files: MetaLens-*.zip
        generate_release_notes: true
        prerelease: ${{ steps.vars.outputs.is_release == 'false' }}
        body: |
          ## MetaLens ${{ steps.vars.outputs.tag }}
          
          **Single exe — no setup needed!** ExifTool is embedded inside.
          
          ### How to use
          1. Download `MetaLens-${{ steps.vars.outputs.tag }}-windows-x64.zip` below
          2. Extract `MetaLens.exe`
          3. Run it and drop any photo, RAW file, or video!
          
          ### What's inside
          - 200+ camera model name resolution (Canon, Nikon, Sony, DJI, Samsung, etc.)
          - 150+ lens model identification
          - Full MakerNotes extraction
          - Search/filter across 1000+ metadata fields
