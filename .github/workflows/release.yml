name: Release MetaLens

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Release Binary
        run: cargo build --release

      - name: Prepare Binary
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}"
          if ($Version -eq "main") { $Version = "latest" }
          Copy-Item "target/release/MetaLens.exe" "MetaLens-$Version.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: MetaLens-${{ github.ref_name }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Manual/Branch)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: MetaLens-Binary
          path: MetaLens-latest.exe
